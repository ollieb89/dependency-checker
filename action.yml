name: 'Dependency Checker'
description: 'Scan for outdated and vulnerable dependencies with npm audit and version checks'
author: 'Ollie B'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'
  check-npm-audit:
    description: 'Run npm audit for vulnerabilities'
    required: false
    default: 'true'
  check-outdated:
    description: 'Check for outdated packages'
    required: false
    default: 'true'
  fail-on-high:
    description: 'Fail if high/critical vulnerabilities found'
    required: false
    default: 'true'
  fail-on-outdated:
    description: 'Fail if outdated packages found'
    required: false
    default: 'false'
  comment-pr:
    description: 'Post results as PR comment'
    required: false
    default: 'true'

outputs:
  audit-found:
    description: 'Number of vulnerabilities found'
  outdated-count:
    description: 'Number of outdated packages'
  audit-summary:
    description: 'Audit vulnerability summary'

runs:
  using: 'node20'
  main: 'index.js'

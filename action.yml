name: Dependency Checker
description: Scan for outdated and vulnerable dependencies in npm, pip, and other package managers

inputs:
  package-managers:
    description: 'Comma-separated list of package managers to check (npm,pip,cargo,composer,bundler)'
    required: false
    default: 'npm'
  fail-on-vulnerable:
    description: 'Fail the action if vulnerabilities are found'
    required: false
    default: 'true'
  fail-on-outdated:
    description: 'Fail the action if outdated dependencies are found'
    required: false
    default: 'false'

outputs:
  vulnerabilities-found:
    description: 'Number of vulnerabilities found'
  outdated-found:
    description: 'Number of outdated dependencies found'
  report:
    description: 'Summary report as JSON'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'alert-triangle'
  color: 'orange'

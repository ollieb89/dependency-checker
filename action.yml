name: 'Dependency Checker'
description: 'Scan for outdated and vulnerable dependencies'
author: 'ollieb89'

inputs:
  npm-check:
    description: 'Check npm dependencies'
    required: false
    default: 'true'
  severity:
    description: 'Minimum severity level (low, moderate, high, critical)'
    required: false
    default: 'moderate'
  fail-on-outdated:
    description: 'Fail if outdated packages found'
    required: false
    default: 'false'

outputs:
  vulnerabilities-found:
    description: 'Number of vulnerabilities found'
  outdated-found:
    description: 'Number of outdated packages found'
  report:
    description: 'Full report as JSON'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'shield-alert'
  color: 'red'

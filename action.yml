name: 'Dependency Checker'
description: 'Scan for outdated and vulnerable dependencies. Reports summary in PR comment.'
author: 'ollieb89'

inputs:
  npm-check-updates:
    description: 'Check npm packages for outdated versions'
    required: false
    default: 'true'
  npm-audit:
    description: 'Run npm audit for security vulnerabilities'
    required: false
    default: 'true'
  fail-on-vulnerabilities:
    description: 'Fail workflow if vulnerabilities found'
    required: false
    default: 'false'
  fail-on-outdated:
    description: 'Fail workflow if outdated deps found'
    required: false
    default: 'false'

outputs:
  vulnerabilities-found:
    description: 'Boolean: vulnerabilities detected'
  outdated-found:
    description: 'Boolean: outdated packages detected'
  vulnerability-count:
    description: 'Count of vulnerable packages'
  outdated-count:
    description: 'Count of outdated packages'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Run dependency checks
      shell: bash
      run: |
        node ${{ github.action_path }}/dist/index.js
      env:
        NPM_CHECK_UPDATES: ${{ inputs.npm-check-updates }}
        NPM_AUDIT: ${{ inputs.npm-audit }}
        FAIL_ON_VULNERABILITIES: ${{ inputs.fail-on-vulnerabilities }}
        FAIL_ON_OUTDATED: ${{ inputs.fail-on-outdated }}
        GITHUB_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}

branding:
  icon: 'alert-circle'
  color: 'orange'

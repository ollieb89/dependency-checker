name: Dependency Checker
description: 'Scan for outdated and vulnerable dependencies, report in PR comments'
author: ollieb89
branding:
  icon: package
  color: blue

inputs:
  check-npm:
    description: 'Check npm packages (package.json)'
    required: false
    default: 'true'
  check-python:
    description: 'Check Python packages (requirements.txt, pyproject.toml)'
    required: false
    default: 'true'
  fail-on-vulnerable:
    description: 'Fail workflow if vulnerabilities found'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for PR comments'
    required: false
    default: ${{ github.token }}

runs:
  using: 'node20'
  main: 'dist/index.js'
